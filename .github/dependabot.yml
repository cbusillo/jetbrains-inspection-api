---
version: 2

multi-ecosystem-groups:
  tooling:
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

updates:
  - package-ecosystem: gradle
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    # CodeQL Java/Kotlin extraction rejects Kotlin 2.4.10 as too recent.
    ignore:
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions:
          - "2.4.10"
      - dependency-name: "plugin.serialization"
        versions:
          - "2.4.10"
      - dependency-name: "jvm"
        versions:
          - "2.4.10"

  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
