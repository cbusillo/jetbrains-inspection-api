---
version: 2

multi-ecosystem-groups:
  tooling:
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

updates:
  - package-ecosystem: gradle
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    labels:
      - dependencies
      - gradle
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    labels:
      - dependencies
      - github-actions
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
