---
name: Release

"on":
  push:
    tags:
      - "v*"

run-name: "Release ${{ github.ref_name }}"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run commit gate
        run: ./scripts/commit-gate.sh --ci

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: |
            build/reports/tests/test/
            inspection-core/build/reports/tests/test/
            mcp-server-jvm/build/reports/tests/test/
          retention-days: 7

  release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Verify Marketplace token
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "PUBLISH_TOKEN is not set in GitHub Secrets."
            exit 1
          fi

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Get version
        id: get_version
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_OUTPUT"
          echo "VERSION=${tag_name#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          scripts/generate-release-notes.sh \
            --version "${{ steps.get_version.outputs.VERSION }}" \
            --output release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Release ${{ steps.get_version.outputs.TAG_NAME }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: ./build/distributions/*.zip
